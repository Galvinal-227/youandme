<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Parallax Scrolling Landscape | Day & Night Cycle</title>
    <style>
        /* ---------- RESET & BASE ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        /* main section (scrub background) */
        section {
            margin: 0;
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #C0B3A0;   /* $scrub equivalent */
        }

        /* content wrapper - holds all parallax layers */
        .content {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* parallax container with background sky (day/night animated) */
        .paralax {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: url("http://www.testomic.com/public/codepen-assets/img/paralax/background.jpg");
            background-size: cover;
            background-position: center;
            /* Applying day-to-night color shifting animation */
            animation: dayToNight 120s ease-in-out infinite;
        }

        /* all parallax layers share width: 400% to allow smooth panning */
        .paralax .layer {
            position: absolute;
            width: 400%;
        }

        /* Foreground layer (closest, moves fastest) */
        .paralax .foreground {
            height: 50%;
            bottom: 0;
            background: url("http://www.testomic.com/public/codepen-assets/img/paralax/foreground.png") repeat-x;
            background-size: 25% 100%;
            animation: slideshow 30s linear infinite;
        }

        /* Hills layer (mid distance) */
        .paralax .hills {
            height: 40%;
            bottom: 15%;
            background: url("http://www.testomic.com/public/codepen-assets/img/paralax/hills.png") repeat-x;
            background-size: 25% 100%;
            animation: slideshow 60s linear infinite;
        }

        /* Rocks1 layer (further) */
        .paralax .rocks1 {
            height: 35%;
            bottom: 25%;
            background: url("http://www.testomic.com/public/codepen-assets/img/paralax/rocks1.png") repeat-x;
            background-size: 25% 100%;
            animation: slideshow 120s linear infinite;
        }

        /* Rocks2 layer (slowest parallax shift) */
        .paralax .rocks2 {
            height: 40%;
            bottom: 15%;
            background: url("http://www.testomic.com/public/codepen-assets/img/paralax/rocks2.png") repeat-x;
            background-size: 25% 100%;
            animation: slideshow 240s linear infinite;
        }

        /* ---------- KEYFRAMES: Horizontal Panning ---------- */
        @keyframes slideshow {
            0% {
                transform: translateX(0%);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        /* ---------- KEYFRAMES: Day to Night Hue + Brightness ---------- */
        @keyframes dayToNight {
            0% {
                -webkit-filter: hue-rotate(0deg) brightness(1);
                filter: hue-rotate(0deg) brightness(1);
            }
            50% {
                -webkit-filter: hue-rotate(180deg) brightness(0.25);
                filter: hue-rotate(180deg) brightness(0.25);
            }
            100% {
                -webkit-filter: hue-rotate(0deg) brightness(1);
                filter: hue-rotate(0deg) brightness(1);
            }
        }

        /* ---------- BRANDING & UI (Nonatomic / link styles) ---------- */
        #link {
            font-family: 'Roboto', sans-serif;
            position: fixed;
            bottom: 5%;
            width: 100%;
            text-align: center;
            z-index: 20;
            pointer-events: none; /* allows clicks to pass through container but link itself remains clickable */
        }

        .url {
            opacity: 0.7;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 1px;
            background: rgba(0,0,0,0.4);
            padding: 8px 18px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            transition: all 0.2s ease;
            pointer-events: auto;
            display: inline-block;
            font-size: 1rem;
        }

        a:link, a:visited {
            color: white;
        }

        a:hover {
            color: #d4b5ff;
            background: rgba(0,0,0,0.7);
            opacity: 1;
            transform: scale(1.02);
        }

        a:active {
            color: #c084fc;
        }

        /* Optional: small logo indicator */
        .img-url {
            text-decoration: none;
        }

        /* version style (optional but included from original structure) */
        #versions {
            font-family: 'Roboto', sans-serif;
            position: fixed;
            top: 5%;
            width: 100%;
            text-align: center;
            z-index: 20;
            pointer-events: none;
        }

        .url-highlighted {
            opacity: 1;
            text-decoration: none;
            color: #ffecb3;
            background: rgba(0,0,0,0.3);
            padding: 4px 12px;
            border-radius: 24px;
            font-size: 0.85rem;
            pointer-events: auto;
        }

        .url-normal {
            opacity: 0.5;
            text-decoration: none;
            color: #ddd;
        }

        /* responsive adjustment: ensure layers always look balanced */
        @media (max-width: 768px) {
            .paralax .foreground, .paralax .hills, .paralax .rocks1, .paralax .rocks2 {
                background-size: 50% 100%;
            }
            .url {
                font-size: 0.85rem;
                padding: 6px 14px;
            }
        }

        /* subtle smoothing */
        .paralax, .layer {
            will-change: transform, filter;
        }
    </style>
</head>
<body>
<section>
    <div class="content">
        <div class="paralax">
            <!-- parallax layers: order matters for depth (back to front) 
                 but all positioned absolute, CSS stacking context as they appear -->
            <div class="layer rocks2"></div>
            <div class="layer rocks1"></div>
            <div class="layer hills"></div>
            <div class="layer foreground"></div>
        </div>
    </div>
</section>

<!-- Optional Versions section: subtle inspired from the original -->

</div>

<!-- 
    Explanation: The scene features a smooth infinite horizontal scrolling background 
    with four distinct layers (rocks2, rocks1, hills, foreground) moving at different speeds,
    creating a parallax effect. Meanwhile, the sky background (paralax element) cycles through
    hue-rotation and brightness, emulating a full day-to-night transition every 120 seconds.
    All SCSS variables have been converted to static CSS values ($scrub -> #C0B3A0, durations used inline).
    The layout is fully responsive, and the original design intent is preserved.
-->
</body>
</html>
