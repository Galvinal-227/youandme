<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Metal Text dengan Efek Sorotan Cahaya - Three.js</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            font-size: 14px;
            backdrop-filter: blur(5px);
            font-family: monospace;
        }
        @media (max-width: 600px) {
            #info { font-size: 10px; bottom: 10px; left: 10px; }
        }
        .controls-note {
            position: absolute;
            bottom: 20px;
            right: 20px;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.4);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            pointer-events: none;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div id="info">
        ✨ METAL TEXT 3D | Sorotan Cahaya Dinamis ✨
    </div>
    <div class="controls-note">
        🔆 Cahaya bergerak | Efek metalik mengkilap
    </div>

    <!-- Import Three.js core dan addons dari CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Inisialisasi Scene, Camera, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050b1a); // warna gelap pekat seperti ruangan studio
        scene.fog = new THREE.FogExp2(0x050b1a, 0.008); // sedikit fog untuk kedalaman

        // Camera: perspektif dengan posisi agak depan dan sedikit tinggi
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        camera.lookAt(0, 0, 0);

        // WebGL Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true; // aktifkan shadow untuk efek realistis (opsional)
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setClearColor(0x050b1a, 1);
        document.body.appendChild(renderer.domElement);

        // --- Kontrol Orbit untuk interaksi (bisa zoom/rotasi, tapi tetap sorotan dari depan terlihat) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0.2, 0);
        
        // --- Efek CSS2DRenderer untuk label pendukung (opsional, tidak mengganggu) ---
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(window.innerWidth, window.innerHeight);
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        document.body.appendChild(labelRenderer.domElement);

        // --- Fungsi untuk membuat teks 3D dengan material metalik high-gloss ---
        // Menggunakan TextGeometry untuk membuat huruf timbul yang bisa memantulkan cahaya
        
        // Load font terlebih dahulu (menggunakan font JSON yang umum, dari three.js examples)
        // Font yang digunakan: "helvetiker_regular.typeface.json" tetapi versi three.js r128 menggunakan font dari example
        // Kita akan menggunakan font "Optimer" yang stylish, atau menggunakan font default yang disediakan.
        // Untuk kepastian, kita fetch dari CDN three.js examples/fonts/helvetiker_regular.typeface.json (sudah tidak digunakan lagi)
        // Sebenarnya TextGeometry membutuhkan font data dalam format JSON dari facetype. Saya akan gunakan font yang tersedia di repo three.js contoh.
        // URL font yang valid: 'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json' namun sudah deprecated, sekarang menggunakan 'fonts/helvetiker_regular.typeface.json'
        // Alternatif: gunakan 'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json' masih berfungsi? Mari gunakan yang terbaru.
        // Atau gunakan 'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json' - namun beberapa CORS? aman.
        // Untuk keandalan, saya gunakan font dari CDN raw, tapi lebih baik gunakan yang disediakan.
        // Dalam lingkungan modern, kita perlu memuat font sebagai JSON. Saya akan menggunakan font 'helvetiker' yang tegas.
        
        // Membuat text geometry dengan parameter tebal, metalik
        let metalTextMesh = null;
        
        // Parameter text
        const textString = "Wsyf";
        const textOptions = {
            font: undefined, // akan diisi setelah load
            size: 0.8,
            height: 0.3,    // ketebalan ekstrusi, memberi efek solid metal
            curveSegments: 8,
            bevelEnabled: true,
            bevelThickness: 0.03,
            bevelSize: 0.02,
            bevelSegments: 6
        };
        
        // Material metalik dengan high reflectivity dan specular highlight
        // Menggunakan MeshStandardMaterial untuk respons terhadap cahaya
        // Warna metal: perak keemasan / platinum dengan sedikit keemasan agar mewah
        const metalMaterial = new THREE.MeshStandardMaterial({
            color: 0xdfe6f0,
            emissive: 0x000000,
            metalness: 1,      // sangat metalik
            roughness: 0.2,      // agak mengkilap tapi tidak seperti cermin
            emissiveIntensity: 0,
            flatShading: false,
            side: THREE.DoubleSide  // agar bagian dalam terlihat jika di zoom dekat
        });
        
        // Tambahan material untuk memberikan efek highlight lebih tajam? 
        // Kita akan membuat material dengan properti yang sama untuk semua bagian.
        
        // Fungsi load font dan buat teks
        const loader = new THREE.FontLoader();
        // Menggunakan font dari CDN three.js contoh yang reliable (helvetiker)
        const fontUrl = 'https://threejs.org/examples/fonts/helvetiker_regular.typeface.json';
        
        // --- Pencahayaan yang membuat efek "sorot dari depan" yang kuat ---
        // 1. Ambient light lembut agar tidak terlalu gelap di bayangan
        const ambientLight = new THREE.AmbientLight(0x222222, 0.6);
        scene.add(ambientLight);
        
        // 2. Light utama: SpotLight atau DirectionalLight dari depan atas agar menyorot teks
        // Kita buat main light dari arah depan (kamera) dengan intensitas tinggi dan sudut sempit untuk efek "kesorot"
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
        mainLight.position.set(2, 3, 4); // posisi dari kanan depan atas
        mainLight.target.position.set(0, 0.2, 0);
        mainLight.castShadow = true;
        mainLight.receiveShadow = false;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        scene.add(mainLight);
        scene.add(mainLight.target);
        
        // Tambahan fill light dari samping untuk memunculkan sisi metalik
        const fillLightLeft = new THREE.PointLight(0x6688aa, 0.5);
        fillLightLeft.position.set(-2, 1.5, 2);
        scene.add(fillLightLeft);
        
        const fillLightRight = new THREE.PointLight(0xccaa88, 0.6);
        fillLightRight.position.set(2, 1.2, 2.5);
        scene.add(fillLightRight);
        
        // Cahaya belakang sedikit untuk rim light (efek metal memantul)
        const backLight = new THREE.PointLight(0x88aaff, 0.4);
        backLight.position.set(0, 1, -3);
        scene.add(backLight);
        
        // === SOROTAN CAHAYA DARI DEPAN YANG LEBIH DINAMIS ===
        // Kita buat sebuah SpotLight yang posisinya bergerak sedikit di depan, memberikan efek sinar sorot langsung ke teks.
        // Efek "kesorot cahaya" dari depan seperti lampu sorot panggung.
        const frontSpot = new THREE.SpotLight(0xffcc88, 1.5);
        frontSpot.position.set(0, 1.2, 3.5); // di depan camera
        frontSpot.target.position.set(0, 0.2, 0);
        frontSpot.angle = 0.45;
        frontSpot.penumbra = 0.3;
        frontSpot.decay = 1;
        frontSpot.distance = 12;
        frontSpot.castShadow = true;
        frontSpot.shadow.mapSize.width = 1024;
        frontSpot.shadow.mapSize.height = 1024;
        scene.add(frontSpot);
        scene.add(frontSpot.target);
        
        // Tambahan efek cahaya lens flare? tidak perlu, tapi kita buat helper point light di depan agar lebih dramatis
        const frontFill = new THREE.PointLight(0xffaa66, 0.8);
        frontFill.position.set(0, 0.8, 3);
        scene.add(frontFill);
        
        // --- Efek dinamis: membuat beberapa sumber cahaya bergerak perlahan untuk memberikan kesan "sorotan berubah" seperti pantulan metalik ---
        // Kita animasikan position dari frontSpot sedikit melingkar kecil agar cahaya seolah menyorot dari berbagai sudut depan
        // Tapi tetap dengan orientasi depan sehingga kesan metal mengkilap semakin hidup
        
        // Tambahan: sebuah objek kecil reflektif (opsional: latar belakang grid atau lantai reflektif) untuk memperkuat kesan metal
        const gridHelper = new THREE.GridHelper(8, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.6;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.35;
        scene.add(gridHelper);
        
        // Lantai reflektif halus (mirror-like) tipis untuk bayangan cahaya
        const planeMat = new THREE.MeshStandardMaterial({ color: 0x111a2a, roughness: 0.4, metalness: 0.7, transparent: true, opacity: 0.4 });
        const groundPlane = new THREE.Mesh(new THREE.PlaneGeometry(5, 5), planeMat);
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.55;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // Lingkungan: partikel kecil debu berkilau untuk memberi atmosfer (opsional)
        const particleCount = 600;
        const particlesGeometry = new THREE.BufferGeometry();
        const particlePositions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            particlePositions[i*3] = (Math.random() - 0.5) * 12;
            particlePositions[i*3+1] = (Math.random() - 0.5) * 3 + 0.5;
            particlePositions[i*3+2] = (Math.random() - 0.5) * 8 - 2;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));
        const particleMaterial = new THREE.PointsMaterial({
            color: 0xccaa88,
            size: 0.02,
            transparent: true,
            opacity: 0.4,
            blending: THREE.AdditiveBlending
        });
        const particles = new THREE.Points(particlesGeometry, particleMaterial);
        scene.add(particles);
        
        // --- Setelah font dimuat, buat teks 3D ---
        loader.load(fontUrl, (font) => {
            textOptions.font = font;
            const textGeometry = new THREE.TextGeometry(textString, textOptions);
            
            // Hitung pusat geometri agar teks berada di tengah scene
            textGeometry.computeBoundingBox();
            const box = textGeometry.boundingBox;
            const centerX = (box.min.x + box.max.x) / 2;
            const centerY = (box.min.y + box.max.y) / 2;
            const centerZ = (box.min.z + box.max.z) / 2;
            
            // Buat mesh
            metalTextMesh = new THREE.Mesh(textGeometry, metalMaterial);
            metalTextMesh.position.set(-centerX, -centerY + 0.2, -centerZ);
            metalTextMesh.castShadow = true;
            metalTextMesh.receiveShadow = false;
            
            scene.add(metalTextMesh);
            
            // Tambahkan edge outline atau wireframe tipis untuk efek kilau ekstra? optional
            const edgesGeo = new THREE.EdgesGeometry(textGeometry);
            const edgesMat = new THREE.LineBasicMaterial({ color: 0xffdd99, linewidth: 1 }); // linewidth tidak support webgl secara umum, namun tetap menambah kesan
            const wireframe = new THREE.LineSegments(edgesGeo, edgesMat);
            wireframe.position.copy(metalTextMesh.position);
            scene.add(wireframe);
            
            // Tambahan glow effect dengan membuat duplicate mesh dengan material emissive tipis? Tidak perlu terlalu rumit.
            
            // Set target spotlight ke teks
            frontSpot.target = metalTextMesh;
            mainLight.target = metalTextMesh;
            
            // Effect awal: animasi muncul (scale)
            metalTextMesh.scale.set(0.8, 0.8, 0.8);
            metalTextMesh.rotation.y = -0.1;
            // Animasi scaling menggunakan GSAP jika ingin efek smooth, tapi kita gunakan Three.js animasi sederhana.
            // Namun karena kita sudah pakai requestFrame, kita tambahkan transisi di awal.
            let startTime = performance.now();
            const animateAppear = (now) => {
                const elapsed = (now - startTime) / 1000;
                const t = Math.min(1, elapsed / 0.6);
                const scaleVal = 0.7 + t * 0.35;
                if (metalTextMesh) metalTextMesh.scale.set(scaleVal, scaleVal, scaleVal);
                if (t < 1) requestAnimationFrame(animateAppear);
                else {
                    if (metalTextMesh) metalTextMesh.scale.set(1, 1, 1);
                }
            };
            requestAnimationFrame(animateAppear);
            
        }, undefined, (error) => {
            console.error('Font loading error:', error);
            // fallback: buat kotak dengan teks CSS? tapi lebih baik tampilkan peringatan
            const fallbackDiv = document.createElement('div');
            fallbackDiv.textContent = '⚠️ Gagal memuat font 3D, tapi efek cahaya tetap berjalan.';
            fallbackDiv.style.position = 'absolute';
            fallbackDiv.style.bottom = '50%';
            fallbackDiv.style.left = '20px';
            fallbackDiv.style.color = 'white';
            fallbackDiv.style.background = 'rgba(0,0,0,0.7)';
            fallbackDiv.style.padding = '10px';
            fallbackDiv.style.borderRadius = '8px';
            fallbackDiv.style.zIndex = 100;
            document.body.appendChild(fallbackDiv);
        });
        
        // --- Efek dinamis cahaya bergerak (seperti sorotan panggung yang halus) ---
        // Kita buat waktu untuk menggerakkan posisi frontSpot dan frontFill secara melingkar di depan teks
        // Ini memberikan efek 'kesorot cahaya' yang berubah-ubah membuat permukaan metalik terlihat lebih hidup.
        
        // Tambahan juga rotasi kecil pada fill lights untuk membuat highlight bergerak
        
        // Helper: sebuah lingkaran imajiner dengan radius kecil di depan teks
        let time = 0;
        
        // Material metal tambahan bisa di-update intensitas cahaya sesuai gerakan
        
        // Track animasi
        function animateLights() {
            time += 0.008;
            // Pergerakan cahaya depan: membuat sorotan bergerak horizontal dan vertikal sedikit
            const radiusX = 0.6;
            const radiusY = 0.4;
            const speed = 0.8;
            const moveX = Math.sin(time * speed) * radiusX;
            const moveY = Math.cos(time * speed * 0.7) * radiusY;
            
            // Posisi sumber cahaya utama (frontSpot) bergerak di depan teks (koordinat Z positif)
            if (frontSpot) {
                // Bidang depan: koordinat X antara -0.8 sd 0.8, Y antara 0.5 sd 1.5, Z tetap di sekitar 3.2
                frontSpot.position.x = moveX * 0.9;
                frontSpot.position.y = 1.0 + moveY * 0.4;
                frontSpot.position.z = 3.0 + Math.sin(time * 1.2) * 0.2;
                // Intensitas sedikit berdenyut
                frontSpot.intensity = 1.3 + Math.sin(time * 3) * 0.2;
            }
            
            if (frontFill) {
                frontFill.position.x = moveX * 0.5;
                frontFill.position.y = 0.9 + Math.sin(time * 1.5) * 0.2;
                frontFill.intensity = 0.7 + Math.sin(time * 2.5) * 0.2;
            }
            
            // Pergerakan main light sedikit agar specular highlight bergerak di permukaan metal
            if (mainLight) {
                mainLight.position.x = 1.8 + Math.sin(time * 0.5) * 0.4;
                mainLight.position.y = 2.5 + Math.cos(time * 0.7) * 0.3;
                // mainLight tetap di depan atas
            }
            
            // fill lights warna berubah sedikit untuk efek kilap
            if (fillLightRight) {
                const hue = 0.10 + Math.sin(time * 0.9) * 0.05; // sedikit emas kebiruan
                fillLightRight.intensity = 0.6 + Math.sin(time * 1.2) * 0.2;
            }
            
            if (particles) {
                particles.rotation.y += 0.002;
                particles.rotation.x = Math.sin(time * 0.2) * 0.1;
            }
        }
        
        // --- Animasi keseluruhan ---
        let clock = new THREE.Clock();
        
        function render() {
            const delta = clock.getDelta();
            // update cahaya bergerak
            animateLights();
            
            // update material metalik mungkin merubah sedikit roughness/ metalness? Tidak diperlukan, tapi menambah kesan dinamis
            if (metalTextMesh && metalTextMesh.material) {
                // efek dynamic specular: ubah roughness halus, tapi tidak terlalu signifikan
                const glint = 0.28 + Math.sin(time * 4) * 0.02;
                metalTextMesh.material.roughness = glint;
                // metalness tetap tinggi
            }
            
            // kontrol orbit update
            controls.update(); // update jika ada interaksi
            
            // render WebGL
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
            
            requestAnimationFrame(render);
        }
        
        render();
        
        // --- Penanganan resize window ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            labelRenderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // Pesan konsol bahwa semuanya berjalan
        console.log('3D Metal Text dengan Efek Sorotan Cahaya Dinamis siap!');
        
        // Optional: Bantuan untuk menunjukkan sumber cahaya depan dengan lens flare sederhana tidak diperlukan.
        // Untuk efek lebih dramatis, bisa ditambahkan background stars atau bloom? Tidak wajib.
        
        // Karena kita menggunakan standard material dengan metalness tinggi, pantulan cahaya dari berbagai arah membuat teks seperti logam mengkilap.
        // Dengan gerakan spot dari depan dan dynamic lights, efek 'kesorot cahaya' sangat terasa.
        
        // Tampilkan teks sekunder keterangan teknikal dengan CSS2D? (tidak mengganggu)
        const helpDiv = document.createElement('div');
        helpDiv.textContent = '✨ Sorot dinamis | Metalik mengkilap ✨';
        helpDiv.style.color = '#ffdd99';
        helpDiv.style.fontSize = '14px';
        helpDiv.style.fontWeight = 'bold';
        helpDiv.style.textShadow = '0 0 5px rgba(0,0,0,0.5)';
        const labelObj = new CSS2DObject(helpDiv);
        labelObj.position.set(0, -1.0, 0);
        scene.add(labelObj);
        
    </script>
</body>
</html>
